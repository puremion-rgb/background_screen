<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Shopping Shot</title>
    <link rel="stylesheet" href="popup.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="header">
      <div class="search-container">
        <input
          type="text"
          id="search-input"
          class="search-input"
          placeholder="메모 내용으로 검색"
        />
      </div>
      <button id="clear-all-btn" class="clear-btn">전체 비우기</button>
    </div>

    <div id="shopping-list" class="grid-container">
      <p id="empty-message" class="empty-text">
        스크랩한 상품이 없습니다.<br />
        상품 이미지에서 우클릭해 보세요!
      </p>
    </div>

    <div id="confirm-modal" class="modal hidden">
      <div class="modal-content">
        <h3 class="modal-title">전체 삭제</h3>
        <p class="modal-desc">
          모든 상품이 삭제됩니다.<br />정말 지우시겠습니까?
        </p>
        <div class="modal-actions">
          <button id="confirm-cancel-btn" class="modal-cancel-btn">취소</button>
          <button id="confirm-delete-btn" class="modal-delete-btn">삭제</button>
        </div>
      </div>
    </div>

    <div id="edit-modal" class="modal hidden">
      <div class="modal-content">
        <h3 class="modal-title">메모</h3>
        <input
          type="text"
          id="memo-input"
          class="modal-input"
          placeholder="메모 입력"
          maxlength="30"
        />

        <div class="color-picker" id="color-picker">
          <div
            class="color-dot-select active"
            data-color=""
            style="background: #e2e8f0"
            title="없음"
          ></div>
          <div
            class="color-dot-select"
            data-color="#ff4e00"
            style="background: #ff4e00"
            title="오렌지"
          ></div>
          <div
            class="color-dot-select"
            data-color="#3182ce"
            style="background: #3182ce"
            title="블루"
          ></div>
          <div
            class="color-dot-select"
            data-color="#38a169"
            style="background: #38a169"
            title="그린"
          ></div>
          <div
            class="color-dot-select"
            data-color="#805ad5"
            style="background: #805ad5"
            title="퍼플"
          ></div>
        </div>

        <div class="modal-actions">
          <button id="edit-cancel-btn" class="modal-cancel-btn">취소</button>
          <button id="edit-save-btn" class="modal-save-btn">저장</button>
        </div>
      </div>
    </div>

    <script src="popup.js"></script>
    <div id="toast" class="toast hidden"></div>
  </body>
</html>
