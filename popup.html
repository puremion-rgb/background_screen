<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Shopping Shot 🛒</title>
    <link rel="stylesheet" href="popup.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- 상단 헤더 구역 -->
    <div class="header">
      <h2 class="logo">Shopping Shot <span>🛒</span></h2>
      <button id="clear-all-btn" class="clear-btn">전체 비우기</button>
    </div>

    <!-- 상품 카드 리스트 구역 -->
    <div id="shopping-list" class="grid-container">
      <!-- 상품이 없을 때 보여줄 메시지 -->
      <p id="empty-message" class="empty-text">
        스크랩한 상품이 없습니다.<br />마음에 드는 이미지 위에서 우클릭해
        보세요!
      </p>
    </div>

    <script src="popup.js"></script>

    <div id="edit-modal" class="modal hidden">
      <div class="modal-content">
        <h3 class="modal-title">상품 수정</h3>

        <input
          type="text"
          id="edit-title"
          class="modal-input"
          placeholder="상품명 입력"
        />

        <input
          type="number"
          id="edit-price"
          class="modal-input"
          placeholder="가격 입력"
        />

        <div class="modal-actions">
          <button id="save-edit-btn" class="modal-save-btn">수정</button>

          <button id="cancel-edit-btn" class="modal-cancel-btn">취소</button>
        </div>
      </div>
    </div>
  </body>
</html>
